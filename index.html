<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>chey's corner</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('citypark.jpg') center/cover no-repeat;
    }

    /* ═══════════ SCENE ═══════════ */
    #scene {
      position: fixed;
      inset: 0;
      transition: filter .5s ease;
    }

    /* Sky gradient */
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        #020112 0%,
        #050228 16%,
        #0b063e 30%,
        #140a52 40%,
        #1e1060 48%,
        #2e1460 55%,
        #48183e 62%,
        #6a2228 69%,
        #8a3018 74%,
        #7a2810 78%,
        #581c0c 82%
      );
    }

    /* Stars */
    #stars { position:absolute; inset:0; height:65%; pointer-events:none; }
    .star {
      position: absolute;
      border-radius: 50%;
      width: var(--s,1.5px); height: var(--s,1.5px);
      background: white;
      opacity: var(--o,.5);
      animation: twinkle var(--d,3s) ease-in-out infinite alternate var(--dl,0s);
    }
    @keyframes twinkle {
      from { opacity: var(--o,.5); }
      to   { opacity: calc(var(--o,.5) * .25); }
    }

    /* Atmosphere glow at horizon */
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }

    /* ─── CITY SVG ─────────────────────────────── */
    .cityscape {
      position: absolute;
      left: 0; right: 0;
      bottom: 36vh;
      line-height: 0;
    }
    .cityscape svg { width:100%; display:block; }

    /* ─── OCEAN ────────────────────────────────── */
    .ocean {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40vh;
      background: linear-gradient(to bottom,
        #6a2010 0%,
        #3a1028 12%,
        #180820 35%,
        #0a0418 65%,
        #04020e 100%
      );
      overflow: hidden;
    }
    /* Horizontal shimmer lines */
    .ocean::before {
      content:'';
      position:absolute; inset:0;
      background: repeating-linear-gradient(
        transparent 0, transparent 7px,
        rgba(255,255,255,.022) 7px, rgba(255,255,255,.022) 8px
      );
      animation: wshift 5s ease-in-out infinite alternate;
    }
    /* Vertical shimmer columns */
    .ocean::after {
      content:'';
      position:absolute; inset:0;
      background: repeating-linear-gradient(
        to right,
        transparent 0, transparent 55px,
        rgba(255,180,80,.04) 55px, rgba(255,180,80,.04) 57px
      );
      animation: wshift2 7s ease-in-out infinite alternate;
    }
    @keyframes wshift  { from{transform:translateX(0)}  to{transform:translateX(22px)} }
    @keyframes wshift2 { from{transform:translateY(0)}  to{transform:translateY(8px)}  }

    /* Reflection blob */
    .reflection {
      position:absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      opacity: .18;
      transform: scaleY(-1);
      filter: blur(3px);
    }
    .reflection svg { width:100%; display:block; }

    /* ─── FLOATING PLACEHOLDERS ───────────────── */
    .floaters { position:absolute; inset:0; pointer-events:none; }

    .floater {
      position: absolute;
      left: var(--x);
      top:  var(--y);
      transform: rotate(var(--rot,0deg));
      pointer-events: auto;
      animation: bob var(--fd,5s) ease-in-out infinite alternate var(--fdelay,0s);
      filter: drop-shadow(0 10px 30px rgba(0,0,0,.7));
    }
    @keyframes bob {
      from { translate: 0 0; }
      to   { translate: 0 -12px; }
    }

    /* Polaroid */
    .fp {
      background: white;
      padding: 7px 7px 28px;
      width: var(--w, 130px);
    }
    .fp-img {
      width: 100%; aspect-ratio: var(--ar,1);
      background: var(--col, linear-gradient(135deg,#2a2a3a,#111118));
      display:flex; align-items:center; justify-content:center;
      overflow: hidden;
    }
    .fp-img img { width:100%;height:100%;object-fit:cover;display:block; }
    .fp-img .ph-label { font-family:'Caveat'; font-size:.75rem; color:rgba(255,255,255,.25); }
    .fp-cap { font-family:'Caveat'; font-size:.85rem; color:#555; text-align:center; margin-top:5px; }

    /* Phone */
    .fph {
      width: var(--w, 85px);
      background: #0e0e0e;
      border-radius: 20px;
      padding: 7px 5px 5px;
      box-shadow: 0 14px 40px rgba(0,0,0,.9), inset 0 0 0 1px rgba(255,255,255,.07);
      position: relative;
    }
    .fph::before { /* notch */
      content:''; position:absolute; top:3px; left:50%; transform:translateX(-50%);
      width:38px; height:4px; background:#0e0e0e; border-radius:2px; z-index:2;
    }
    .fph-scr {
      border-radius: 14px; aspect-ratio: 9/19.5;
      background: var(--col, linear-gradient(160deg,#1a0f40,#0f0825));
      display:flex; align-items:center; justify-content:center;
      font-size: 1.6rem;
    }

    /* GIF / image box */
    .fg {
      width: var(--w,150px);
      aspect-ratio: var(--ar,4/3);
      background: var(--col, linear-gradient(135deg,#1a1528,#0a0814));
      border-radius: 3px;
      border: 1.5px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:center;
    }
    .fg span { font-family:'Caveat'; font-size:.8rem; color:rgba(255,255,255,.25); letter-spacing:.1em; text-transform:uppercase; }

    /* Film strip */
    .ff {
      width: var(--w,100px);
      background: #111;
      border: 2px solid #222;
      padding: 4px 2px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ff-frame {
      width:100%; aspect-ratio:3/2;
      background: var(--col, #1a1a2a);
      display:flex; align-items:center; justify-content:center;
      font-size:.75rem;
    }
    .ff-hole { width:6px;height:6px;border-radius:50%;background:#222;margin:0 auto; }

    /* ─── HERO ─────────────────────────────────── */
    .hero {
      position: absolute;
      bottom: 24%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 30;
      white-space: nowrap;
    }
    .hero h1 {
      font-family: 'Caveat';
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 700;
      color: rgba(255,255,255,.92);
      line-height: 1;
      text-shadow: 0 0 80px rgba(120,80,255,.6), 0 4px 24px rgba(0,0,0,.9);
      letter-spacing: -.01em;
    }
    .hero h1 em { color: #ffd080; font-style:normal; }

    #enterBtn {
      display: inline-block;
      margin-top: 1.1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Caveat';
      font-size: 1.4rem;
      color: rgba(255,255,255,.55);
      letter-spacing: .14em;
      text-transform: lowercase;
      transition: color .2s, transform .2s;
      position: relative;
    }
    #enterBtn:hover { color: rgba(255,255,255,.9); }
    .enter-arrow {
      display: inline-block;
      animation: nudge 1.8s ease-in-out infinite;
    }
    @keyframes nudge {
      0%,100% { transform: translateX(0); }
      50%      { transform: translateX(7px); }
    }

    /* ═══════════ DOOR OVERLAY ═══════════ */
    /* warm light backing — visible through open doors */
    #door-backing {
      position: fixed; inset:0; z-index:80;
      background: #f3ede2;
      opacity: 0;
      transition: opacity .4s ease;
      pointer-events: none;
    }

    #doors {
      position: fixed; inset:0; z-index:100;
      pointer-events: none;
      /* perspective applied per panel for correct 3D */
    }
    .door {
      position: absolute;
      top:0; bottom:0; width:50%;
      /* wood-ish gradient */
      background: linear-gradient(
        180deg,
        #1c1206 0%, #2a1c08 20%, #1e1408 40%,
        #2a1c08 60%, #1c1206 80%, #120e04 100%
      );
      pointer-events: none;
    }
    /* wood grain lines */
    .door::before {
      content:'';
      position:absolute;inset:0;
      background: repeating-linear-gradient(
        2deg,
        transparent 0, transparent 9px,
        rgba(255,255,255,.018) 9px, rgba(255,255,255,.018) 10px
      );
    }
    /* subtle panel inset */
    .door::after {
      content:'';
      position:absolute;
      inset: 12% 15%;
      border: 2px solid rgba(255,255,255,.06);
      border-radius: 2px;
    }

    .door.left {
      left:0;
      transform-origin: left center;
      perspective-origin: left center;
      transform: translateX(-100%); /* off screen initially */
      transition: transform 1.15s cubic-bezier(.6,0,.35,1);
    }
    .door.right {
      right:0;
      transform-origin: right center;
      perspective-origin: right center;
      transform: translateX(100%); /* off screen initially */
      transition: transform 1.15s cubic-bezier(.6,0,.35,1);
    }

    /* Step 1: doors slide IN to cover screen */
    #doors.closing .door.left  { transform: translateX(0); }
    #doors.closing .door.right { transform: translateX(0); }

    /* Step 2: doors swing open (3D) */
    #doors.opening .door.left  { transform: perspective(1600px) rotateY(-108deg); }
    #doors.opening .door.right { transform: perspective(1600px) rotateY(108deg); }

  </style>
</head>

<!-- Warm cream backing visible through open doors -->
<div id="door-backing"></div>

<!-- Door panels -->
<div id="doors">
  <div class="door left"></div>
  <div class="door right"></div>
</div>

<script>
  // ── Generate stars ─────────────────────────────────
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const big = Math.random() < .07;
    s.style.cssText = `
      left:${(Math.random()*100).toFixed(1)}%;
      top:${(Math.random()*100).toFixed(1)}%;
      --s:${big ? '2.5px' : Math.random() < .7 ? '1.5px' : '2px'};
      --o:${(Math.random()*.55+.25).toFixed(2)};
      --d:${(Math.random()*3+2).toFixed(1)}s;
      --dl:${(Math.random()*5).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── Enter button → door animation ─────────────────
  const btn     = document.getElementById('enterBtn');
  const doors   = document.getElementById('doors');
  const backing = document.getElementById('door-backing');
  const scene   = document.getElementById('scene');

  btn.addEventListener('click', () => {
    btn.disabled = true;

    // 1. Dim scene slightly
    scene.style.filter = 'brightness(.6)';

    // 2. Warm backing fades in (seen through open doors)
    backing.style.opacity = '1';

    // 3. Doors slide in from sides (closing)
    setTimeout(() => {
      doors.classList.add('closing');
    }, 300);

    // 4. After doors close, navigate to portfolio
    setTimeout(() => {
      window.location.href = 'portfolio.html';
    }, 1100);
  });
</script>
